# Bitwarden Browser Extension Build with fakePremium Patch
# Automatically pulls latest source and applies premium unlock patch
name: Build Bitwarden with Premium Patch

on:
  workflow_dispatch:
    inputs: {}
  push:
    branches: [master, main]
  schedule:
    # Build every Sunday at 12:00 UTC
    - cron: "0 12 * * 0"

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-24.04
    outputs:
      latest_browser_tag: ${{ steps.gen_vars.outputs.latest_browser_tag }}
      node_version: ${{ steps.get_node_version.outputs.node_version }}
      skip_build: ${{ steps.check_release.outputs.skip_build }}
    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Get Latest Browser Tag (via API)
        id: gen_vars
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get all tags from Bitwarden clients repo via GitHub API
          latest_browser_tag=$(gh api repos/bitwarden/clients/tags --paginate --jq '.[].name' | grep -i browser | head -1)
          echo "latest_browser_tag=$latest_browser_tag" >> $GITHUB_OUTPUT
          echo "Latest browser tag: $latest_browser_tag"

      - name: Get Node Version (via API)
        id: get_node_version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get .nvmrc content from Bitwarden clients repo via GitHub API
          nvmrc=$(gh api repos/bitwarden/clients/contents/.nvmrc --jq '.content' | base64 -d)
          NODE_VERSION=${nvmrc/v/''}
          echo "node_version=$NODE_VERSION" >> $GITHUB_OUTPUT
          echo "Node version: $NODE_VERSION"

      - name: Check if release exists
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.gen_vars.outputs.latest_browser_tag }}"
          if gh release view "$TAG" --repo "${{ github.repository }}" &>/dev/null; then
            echo "skip_build=true" >> $GITHUB_OUTPUT
            echo "::notice::Release $TAG already exists, skipping build"
          else
            echo "skip_build=false" >> $GITHUB_OUTPUT
            echo "No existing release for $TAG, proceeding with build"
          fi

  build:
    name: Build
    runs-on: ubuntu-22.04
    needs: setup
    if: needs.setup.outputs.skip_build != 'true'
    env:
      _LATEST_BROWSER_TAG: ${{ needs.setup.outputs.latest_browser_tag }}
      _NODE_VERSION: ${{ needs.setup.outputs.node_version }}
    strategy:
      matrix:
        include:
          - name: "chrome"
            npm_command: "dist:chrome"
            archive_name: "dist-chrome.zip"
          - name: "firefox"
            npm_command: "dist:firefox"
            archive_name: "dist-firefox.zip"
          - name: "edge"
            npm_command: "dist:edge"
            archive_name: "dist-edge.zip"
          - name: "opera"
            npm_command: "dist:opera"
            archive_name: "dist-opera.zip"
    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Clone Bitwarden clients
        run: git clone https://github.com/bitwarden/clients.git

      - name: Setup repo
        working-directory: clients
        run: |
          git fetch --tags
          echo "Checking out ${{ env._LATEST_BROWSER_TAG }}"
          git checkout ${{ env._LATEST_BROWSER_TAG }}

      - name: Apply fakePremium patch
        run: |
          cp patches/fakePremium.patch clients/
          cd clients
          git apply fakePremium.patch -v

      - name: Cache npm dependencies
        uses: actions/cache@v5
        with:
          path: |
            clients/node_modules
            clients/**/node_modules
          key: npm-${{ env._LATEST_BROWSER_TAG }}-${{ hashFiles('clients/**/package-lock.json') }}
          restore-keys: |
            npm-${{ env._LATEST_BROWSER_TAG }}-
            npm-

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          cache: "npm"
          cache-dependency-path: "**/package-lock.json"
          node-version: ${{ env._NODE_VERSION }}

      - name: Print environment
        run: |
          node --version
          npm --version

      - name: NPM setup
        working-directory: clients
        run: npm ci

      - name: Build extension (${{ matrix.name }})
        working-directory: clients/apps/browser
        run: npm run ${{ matrix.npm_command }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}-${{ env._LATEST_BROWSER_TAG }}
          path: clients/apps/browser/dist/${{ matrix.archive_name }}
          if-no-files-found: error

  pack-source:
    name: Pack Source
    runs-on: ubuntu-22.04
    needs: setup
    if: needs.setup.outputs.skip_build != 'true'
    env:
      _LATEST_BROWSER_TAG: ${{ needs.setup.outputs.latest_browser_tag }}
    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Clone Bitwarden clients
        run: git clone https://github.com/bitwarden/clients.git

      - name: Setup repo
        working-directory: clients
        run: |
          git fetch --tags
          echo "Checking out ${{ env._LATEST_BROWSER_TAG }}"
          git checkout ${{ env._LATEST_BROWSER_TAG }}

      - name: Apply fakePremium patch
        run: |
          cp patches/fakePremium.patch clients/
          cd clients
          git apply fakePremium.patch -v

      - name: Pack source code
        working-directory: clients
        run: |
          # Include hidden files in glob copy
          shopt -s dotglob

          # Remove ".git" directory
          rm -rf .git

          # Create browser-source directory
          mkdir browser-source

          # Copy root level files
          FILES=$(find . -maxdepth 1 -type f)
          for FILE in $FILES; do cp "$FILE" browser-source/; done

          # Copy apps/browser
          mkdir -p browser-source/apps/browser
          cp -r apps/browser/* browser-source/apps/browser/

          # Copy libs
          mkdir browser-source/libs
          cp -r libs/* browser-source/libs/

          # Create zip
          zip -r browser-source.zip browser-source

      - name: Upload source artifact
        uses: actions/upload-artifact@v7
        with:
          name: browser-source-${{ env._LATEST_BROWSER_TAG }}
          path: clients/browser-source.zip
          if-no-files-found: error

  release:
    name: Release
    runs-on: ubuntu-22.04
    needs:
      - setup
      - build
      - pack-source
    if: needs.setup.outputs.skip_build != 'true'
    env:
      _LATEST_BROWSER_TAG: ${{ needs.setup.outputs.latest_browser_tag }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "artifacts/*"
          tag: "${{ env._LATEST_BROWSER_TAG }}"
          name: "${{ env._LATEST_BROWSER_TAG }}"
          body: "${{ env._LATEST_BROWSER_TAG }} - Bitwarden Browser Extension with Premium Patch\n\n[Original Changelog](https://github.com/bitwarden/clients/releases/tag/${{ env._LATEST_BROWSER_TAG }})"
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          allowUpdates: true
          makeLatest: true
